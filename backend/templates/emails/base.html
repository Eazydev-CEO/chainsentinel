{% autoescape on %}
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#0b0f17;font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;">
  <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
    <div style="text-align:left;padding-bottom:20px;">
      <span style="font-size:18px;font-weight:700;color:#e8ecf4;">⛓ Chain<span style="color:#4f8cff;">Sentinel</span></span>
    </div>
    <div style="background:#121826;border:1px solid #1f2a3d;border-radius:12px;padding:28px 24px;color:#c6cede;font-size:14px;line-height:1.65;">
      {% block content %}{% endblock %}
    </div>
    <p style="font-size:12px;color:#56627a;padding-top:16px;line-height:1.5;">
      You are receiving this because you have a ChainSentinel account.<br>
      Manage notification preferences in your dashboard settings.
    </p>
  </div>
</body>
</html>
{% endautoescape %}
