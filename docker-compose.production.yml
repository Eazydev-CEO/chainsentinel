# ChainSentinel — production stack
# Usage: docker compose -f docker-compose.production.yml up -d --build
# Only nginx (80/443) is exposed. Postgres/Redis stay on the internal network.
name: chainsentinel-prod

x-backend: &backend
  build:
    context: ./backend
    args:
      REQUIREMENTS: production.txt
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.production
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    # no ports: — internal network only

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    <<: *backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "true"
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8212/healthz/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  celery_worker:
    <<: *backend
    command: celery -A config worker -l info -Q default,engine,delivery --concurrency=4 --max-tasks-per-child=500
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_beat:
    <<: *backend
    command: celery -A config beat -l info

  frontend:
    build: ./frontend
    env_file: .env
    environment:
      API_INTERNAL_URL: http://backend:8212
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"   # enable after installing certificates (see docs/DEPLOYMENT.md)
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/srv/static:ro
      # - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
