# ChainSentinel reverse proxy: / → Next.js, /api + /admin + /static → Django.
#
# HTTPS: once certificates exist (e.g. certbot), copy this server block to
# listen 443 ssl, add the certificate directives below, and redirect port 80.

upstream frontend_upstream {
    server frontend:3026;
}

upstream backend_upstream {
    server backend:8212;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 5m;

    # --- security headers (mirrors app-level middleware) ---------------------
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # --- Django API ------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Tighter limits on credential endpoints
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # Django static (admin, swagger) — collected into the shared volume
    location /static/ {
        alias /srv/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Next.js -----------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

